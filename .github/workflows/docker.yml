name: docker

on:
  push:
    branches: "main"
    tags: "v*"
  workflow_dispatch:

env:
  IMAGE_NAME: marksverdhei/bakery

jobs:
  build-amd64:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: marksverdhei
          password: ${{ secrets.DOCKER_PAT }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and push
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:ci-build -f Dockerfile .
          for tag in ${{ steps.meta.outputs.tags }}; do
            docker tag ${{ env.IMAGE_NAME }}:ci-build "$tag"
            docker push "$tag"
          done

  build-arm64:
    runs-on: [self-hosted, linux, x64]
    needs: build-amd64
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: marksverdhei
          password: ${{ secrets.DOCKER_PAT }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest-arm64,enable={{is_default_branch}}
            type=semver,pattern={{version}},suffix=-arm64
            type=sha,prefix=,suffix=-arm64

      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.arm64
          platforms: linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
